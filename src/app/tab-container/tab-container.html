@if (tabs().length > 0) {
<mat-tab-group class="block h-full min-h-0" dynamicHeight="false" mat-stretch-tabs="false" animationDuration="120ms"
    [selectedIndex]="selectedIndex()" (selectedIndexChange)="selectTab($event)">

    @for (tab of tabs(); track tab.id) {
    <mat-tab>
        <ng-template mat-tab-label>
            <div class="flex items-center justify-center" (auxclick)="closeTab($event, tab.id)">

                @if (tab.menuItem.icon) {
                <fa-icon class="text-base" [class]="tab.menuItem.iconColor || 'text-yellow-500'"
                    [icon]="tab.menuItem.icon">
                </fa-icon>
                }

                <span class="ml-2 max-w-48 truncate select-none">
                    {{ tab.menuItem.text }}
                </span>

                @if (tab.closable !== false) {
                <button type="button" class="ml-1 scale-75" aria-label="Close tab" (click)="closeTab($event, tab.id)">
                    <fa-icon class="text-base" [class]="'text-red-400 hover:text-red-600'" [icon]="'xmark'">
                    </fa-icon>
                </button>
                }

            </div>
        </ng-template>

        <div class="h-full min-h-0 overflow-auto">
            <app-tab-content-table class="block h-full min-h-0" [menuItem]="tab.menuItem"
                [active]="tab.id === activeTabId()"></app-tab-content-table>
        </div>
    </mat-tab>
    }
</mat-tab-group>
} @else {
<div class="h-full grid place-items-center p-6 text-sm text-slate-500">
    No screen is open.
</div>
}
