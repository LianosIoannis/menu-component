<section class="h-full min-h-0 flex flex-col bg-white">
    <header class="shrink-0 border-b border-slate-200 px-4 py-3">
        <div class="flex items-center justify-between gap-3">
            <div>
                @if (title()) {
                <h2 class="text-sm font-semibold text-slate-900">
                    {{ title() }}
                </h2>
                }
            </div>

            <div class="flex items-center gap-2">
                <ng-content select="[table-actions]" />
            </div>
        </div>

        <ng-content select="[table-header]" />
    </header>

    <div class="flex-1 min-h-0">
        <ag-grid-angular [rowData]="rowData()" [columnDefs]="columnDefs()"
            [rowSelection]="rowSelection" [gridOptions]="gridOptions" (rowClicked)="onRowClicked($event)">
        </ag-grid-angular>
    </div>
</section>
